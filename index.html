        function readfile (file) {
    		//var dfrd = $.Deferred();
//     		var file = files[fn];

        	if (file) {
        		switch (file_ext.toUpperCase()) {
        			case "XLS":
        			case "XLSX":
	        			reader.onload = function(e) {
		                    // browser completed reading file - display it
		                    var wb = XLSX.read(e.target.result,{type: 'binary'})
		                    
		                    var n_sh = wb.SheetNames.length
		                    
		                    var csv_text = XLSX.utils.sheet_to_csv(wb.Sheets[wb.SheetNames[0]],{FS: ';'})

		                    //debugger;
		                    dfrd = processData(e.target.result)
		                };

        function processData(allText) {
            var allTextLines = allText.split(/\r\n|\n/);
            var splitstr = ';';
            var line0_s = (allTextLines[0].match(/,/g) || []).length;
            var line1_s = (allTextLines[0].match(/,/g) || []).length;
            
            if (line0_s > 0 && line0_s === line1_s) {
            	splitstr = ','
            }
			
//             var headers = allTextLines[0].split(splistr);
			var tab_width = allTextLines[0].split(splitstr).length;
            var lines = [];

            for (var i=0; i<allTextLines.length; i++) {
                var data_l = allTextLines[i].split(splitstr);
                
                if (data_l.length == tab_width) {

//                 var tarr = [];
//                 for (var j=0; j<headers.length; j++) {
//                     tarr.push(headers[j]+":"+data[j]);
//                 }
// 					console.log(data)
					if (i > frstdatarow - 1 && allTextLines[i].length === tab_width - 1) {break;}
					var count = 0;
					data_l.forEach(function(v,j) {if (i >= frstdatarow - 1 && v !== '' && j >= frstdatacolumn - 1) count += 1})
					if (count === 0 && i >= frstdatarow - 1) {continue;}
					//debugger;
	                lines.push(data_l);
                }
            }
            
            var dt= localStorage.getItem("data_st");
            //console.log(data)
            if (dt[0] == null) {
            	return createDatastructure(lines);
            } else {
            	
            	//d3.select('#qtab').remove();
            	return addData(lines)
            }
			
            //debugger;
        }

		function getMaxIdx (data) {

			return Math.max.apply(null,maxArr)

        function arraysEqual(arr1, arr2) {
            if(arr1.length !== arr2.length)
                return false;

            for(var i = arr1.length; i--;) {
                if(arr1[i] !== arr2[i])
                    return false;
            }

            return true;
        }
        
        function createChkArr (inputArr,k,sampleidx_i) {
        	chkArr=[];

        			if (data[z].analysis[l].idx === k) {
        				chkArr.push(data[z].analysis[l].value);
        				break;
        			}
        		}	
        	}
        	
        	if ( arraysEqual(chkArr.sort(), inputArr.sort())) {
        		if (k < sampleidx_i) { k+=1; createChkArr(inputArr,k,sampleidx_i)}
        		return true;
        	} else { return false;}
        }

        function nestData(data) {
        	var root={}, 
            path, amostra, elemento, i, j, N, M, z, test, idx;

	        for (i = 0, N=data.length; i<N; i++){
	            //for each path in the data array 
	            path = data[i];
	            
	            for (j=0,M=path.analysis.length; j<M; j++){
	                //follow the path through the tree
	                //creating new nodes as necessary

	            	if (!root[0]) {
		            	root[0] = {name: path.analysis[j].name,
		            			   qaqc: path.analysis[j].qaqc,
		            			   type: path.analysis[j].type}
		            }

			        test = false;
		        	for (z=0;z<Object.keys(root).length; z++) {
		        		if (root[z].name === path.analysis[j].name) {
		        			test = true;
		        			idx = z;
		        			break;
		        		}
		        	}

		        	if (test) {
		        		amostra = root[idx];
		        	} else {
		        		amostra = root[Object.keys(root).length] = {name: path.analysis[j].name,
											            			  qaqc: path.analysis[j].qaqc,
											            			  type: path.analysis[j].type}
		        	}

	                
	                if (!amostra.analysis){ 
	                    amostra.analysis = {}; 
	                }
	                
	                if (!amostra.analysis[0]) {
	                	amostra.analysis[0] = {element: path.element};
	                }
	                
	                test = false;
                	for (z=0;z<Object.keys(amostra.analysis).length; z++) {
                		if (amostra.analysis[z].element === path.element) {
                			test = true;
                			idx = z;
                			break;
                		}
                	}
                	
                	if (test) {
                		elemento = amostra.analysis[idx];
                	} else {
                		elemento = amostra.analysis[Object.keys(amostra.analysis).length] = {element: path.element};
                	}
                	
	                if (!elemento.group){ 
	                	elemento.group = {}; 
	                }
	                
	                if (!elemento.group[0]) {
	                	elemento.group[0] = {method: path.method,
            			            	   	mdl: path.mdl,
            			            	   	unit: path.unit};

	                }
                		
               		test = false;
                   	for (z=0;z<Object.keys(elemento.group).length; z++) {
                   		if (elemento.group[z].method === path.method) {
                   			test = true;
                   			idx = z;
                   			break;
                   		}
                   	}
               		
                   	if (test) {
                   		metodo = elemento.group[idx];
                   	} else {
                   		metodo = elemento.group[Object.keys(elemento.group).length] = {method: path.method,
																	            	  mdl: path.mdl,
																	            	  unit: path.unit};
                   	}
                    
                   	if (!metodo.values) {
                   		metodo.values = {};
                   	}
                   	
                   	if (!metodo.values[0]) {
                   		metodo.values[0] = {idx: path.analysis[j].idx,
			            	   				value: path.analysis[j].value
			    	   						}
                   	} 
                   	
               		test = false;
                   	for (z=0;z<Object.keys(metodo.values).length; z++) {
                   		if (metodo.values[z].idx === path.analysis[j].idx) {
                   			test = true;
                   			idx = z;
                   			break;
                   		}
                   	}
                   	if (!test) {
                   		metodo.values[Object.keys(metodo.values).length] = {idx: path.analysis[j].idx,
								            	   			  				value: path.analysis[j].value  							  }
                   	}
     
	            }    
	        }
	        return root;
        }
        
        function removeNoDataVals (ElemArr,st) {
        	var search_term = st;

        	for (var j=0; j<ElemArr.length; j++) {
        		for (var i=ElemArr[j].analysis.length-1; i>=0; i--){
	        	    if (ElemArr[j].analysis[i] === search_term) {
	        	    	ElemArr[j].analysis.splice(i, 1);
	        	    }
        		}
        	}
        	
        	return ElemArr
        }

            if (n.length > 1) {

            }
            
            pp = [];

            	}
            }
//             if (typeof callback !== 'undefined') {

//             }
            return pp;
        }

		function boxWhiskers(d) {
		    var q1 = d.quartiles[0],
		        q3 = d.quartiles[2],
		        iqr = (q3 - q1) * 1.5,
		        i = -1,
		        j = d.length;
		    while (d[++i] < q1 - iqr);
		    while (d[--j] > q3 + iqr);
		    return [i, j];
		}
		
		function boxWhiskers_anom(d) {
		    var q1 = d.quartiles[0],
		        q3 = d.quartiles[2],
		        iqr = (q3 - q1) * 3,
		        i = -1,
		        j = d.length;
		    while (d[++i] < q1 - iqr);
		    while (d[--j] > q3 + iqr);
		    return [i, j];
		}

		function boxQuartiles(d) {
		    return [
		        d3.quantile(d, 0.25),
		        d3.quantile(d, 0.5),
		        d3.quantile(d, 0.75)
		    ];
		}
		
		function boxQuartiles_idx(d) {
		    
	        var q1 = d3.quantile(d, 0.25),
	        q2 = d3.quantile(d, 0.5),
	        q3 = d3.quantile(d, 0.75),
	        i = -1,
	        j = d.length,
	        k;
	        
	        if (j%2 === 0) {
	        	k = [(j/2)-1,j/2]
	        } else {
	        	k = [(j-1)/2]
	        }
	        
	        while (d[++i] < q1);
	        while (d[--j] > q3);
	        
	        return [i,k,j];
		    
		}

        	switch(val){

        		case "BLK":
        			return ["rgb(242, 242, 242)","rgb(77, 77, 77)","rgba(77,77,77,1)"];
        		case "DUP":
        			return ["rgb(173, 235, 173)","rgb(77, 77, 77)","rgba(77,77,77,0)"];
        		case "REP":
        			return ["rgb(0, 204, 102)","rgb(77, 77, 77)","rgba(77,77,77,0)"];
        		case "STD":
        			return ["rgb(255, 219, 77)","rgb(77, 77, 77)","rgba(77,77,77,0)"];
        		default:
        			return ["rgb(179, 204, 255)","rgb(77, 77, 77)","rgba(77,77,77,0)"];
        	}
        };
        
        function text_cel_bp(val,bp_arr,qaqc){
        	
        	if (typeof bp_arr === 'undefined' || qaqc != "SMP") {return ['normal',11];}
        	
        
        	var val = check_dl(val),
        	wi = bp_arr.whisker[0],
		 	ws = bp_arr.whisker[1];
        	//console.log(val,bp_arr)
        	if(val) {
        		if (val < wi || val > ws) {
        			return ['bold',13];
        		} else {
        			return ['normal',11];
        		};
        	} else {
        		return ['normal',11];
        	};
        };
        
        function color_cel_bp(val,bp_arr,qaqc){
        	
        	var out_arr = [];
        	var txt_arr = text_cel_bp(val,bp_arr,qaqc);
        	
        	if (typeof bp_arr === 'undefined') {return [["rgb(204, 204, 153)","rgb(77,77,77)"], txt_arr];}
        	
        	if (qaqc === "SMP" || isNaN(val.replace('<','').replace('>','').replace(',','.'))) {
	        	var val = check_dl(val),
				 	q1 = bp_arr.q[0],
				 	q3 = bp_arr.q[2],
				 	wi = bp_arr.whisker[0],
				 	ws = bp_arr.whisker[1],
				 	oi = bp_arr.whisker_anom[0],
				 	os = bp_arr.whisker_anom[1];
				 	
				 	  					
			 	if (val) {
			 		
			 		if (val < oi) {
			 			out_arr = ["rgb(45, 89, 134)","rgb(255,255,255)"];
			 		} else if (val >= oi && val < wi) {
			 			out_arr = ["rgb(83, 140, 198)","rgb(255,255,255)"];
			 		} else if (val >= wi && val < q1) {
			 			out_arr = ["rgb(180, 205, 228)","rgb(77,77,77)"];
			 		} else if (val >= q1 && val <= q3) {
			 			out_arr = ["rgb(255, 255, 179)","rgb(77,77,77)"];
			 		} else if (val > q3 && val <= ws) {
			 			out_arr = ["rgb(255, 204, 153)","rgb(77,77,77)"];
			 		} else if (val > ws && val <= os) {
			 			out_arr = ["rgb(255, 166, 77)","rgb(255,255,255)"];
			 		} else if (val > os) {
			 			out_arr = ["rgb(255, 77, 77)","rgb(255,255,255)"]; 
			 		} 
			 	} else {
			 		out_arr = ["rgb(217, 217, 217)","rgb(77,77,77)"]
			 	}
        	} else {
        		out_arr = color_qaqc(qaqc);
        	};
        	
//         	out_arr.push(txt_arr[0]);
//         	out_arr.push(txt_arr[1]);
        	return [out_arr,txt_arr];
        };
        
        function color_oxideTotal (val,qaqc){
        	if (isNaN(val)) {return [["rgb(217, 217, 217)","rgb(77,77,77)"],['normal',11]]}
        	if (val > 102) {

        	} else if (val > 101 && val <= 102) {
        		return [["rgb(255, 204, 153)","rgb(77,77,77)"],['normal',11]];
        	} else if (val >= 99 && val <= 101) {
        		return [["rgb(255, 255, 179)","rgb(77,77,77)"],['normal',11]];
        	} else if (val >= 98 && val < 99) {
        		return [["rgb(180, 205, 228)","rgb(77,77,77)"],['normal',11]];
        	} else if (val < 98) {
        		return [["rgb(83, 140, 198)","rgb(255,255,255)"],['bold',13]];
        	};

	        			b.value = +b.value
	        		} else if (isNaN(a.value) && !isNaN(b.value)){

	        			b.value = +b.value
	        		} else if (!isNaN(a.value) && isNaN(b.value)) {
	        			//console.log(b.value)
	        			a.value = +a.value
	        			b.value = -1000
	        		}
        			
        			if(a.value == b.value)				        		
	        	        return 0;
	        	    if(a.value < b.value)

	        	        	return -1;
	        	    	} else {
	        	    		return 1;
	        	    	}
	        	    if(a.value > b.value)

	        	        	return 1;
	        	    	} else {
	        	    		return -1;
	        	    	}
	        	})
	        	console.log(defOrder)
	        	
        		defOrder.forEach(function(e){
        			neworder.push(e.idx)
        		});

        			}
        			
        		};

        		return neworder;

        function filter_cells_range(col,min,max,nan) {
        	if (typeof nan === 'undefined') nan = [];
        	
        	var remove_rows = [];
        	filterData[col].analysis = filterData[col].analysis.filter(function(d){
        		var raw_v = d.value.replace("<","").replace(">","").replace(",",".")
        		var v = +raw_v
        		if (isNaN(v)) {
        			debugger;
        			if (nan.includes(raw_v)) {
        				remove_rows.push(d.idx); 
        				return false;
        			} else {
        				return true;
        			}
        		};
        		
        		if (min == -1 || max == -1) {
        			return true
        		} else {
	        		if (v >= +min && v <= +max) {
	        			return true;
	        		} else {
	        			remove_rows.push(d.idx);
	        			return false;
	        		};
        		};
        	});
        	
        	for (var i = 0; i<filterData.length; i++) {
        		//debugger;
        		filterData[i].analysis = filterData[i].analysis.filter(function (dt){
        			//debugger;
        			if (remove_rows.includes(dt.idx)) {
        				return false
        			} else {
        				return true
        			}
        		});
        	};
        }
        
        function filter_cells_key(key,nan) {
        	if (typeof nan === 'undefined') nan = [];
        	
        	var remove_rows = [];
        	filterData.forEach(function(dt) {
        		dt.analysis.forEach(function (ana){
        			var raw_v = ana[key]
        			
        			if (isNaN(raw_v)) {
        			//debugger;
	        			if (nan.includes(raw_v)) {
	        				remove_rows.push(ana.idx); 
	        			} 
	        		};
        		})
        	})

        	for (var i = 0; i<filterData.length; i++) {
        		//debugger;
        		filterData[i].analysis = filterData[i].analysis.filter(function (dt){
        			//debugger;
        			if (remove_rows.includes(dt.idx)) {
        				return false
        			} else {
        				return true
        			}
        		});
        	};
